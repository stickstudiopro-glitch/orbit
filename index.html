        const gamesGrid = document.getElementById('gamesGrid');
        const searchInput = document.getElementById('searchInput');
        const statsBar = document.getElementById('statsBar');

        function displayGames(filteredGames) {
            gamesGrid.innerHTML = '';
            
            if(filteredGames.length === 0) {
                gamesGrid.innerHTML = '<div class="no-results">No space games match your criteria. Try another keyword.</div>';
                statsBar.innerText = 'Showing 0 records';
                return;
            }

            filteredGames.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    <img class="game-img" src="${game.img}" alt="${game.name}">
                    <div class="game-info">
                        <div class="game-title">${game.name}</div>
                        <div class="game-desc">${game.desc}</div>
                        <a class="game-btn" href="${game.url}" target="_blank" rel="noopener">Access Game Website</a>
                    </div>
                `;
                gamesGrid.appendChild(card);
            });

            statsBar.innerText = `Showing ${filteredGames.length} database records`;
        }

        // Live Dynamic Filtering Action
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const matched = games.filter(game => 
                game.name.toLowerCase().includes(query) || 
                game.desc.toLowerCase().includes(query)
            );
            displayGames(matched);
        });

        // Initialize First Display Run
        displayGames(games);
    </script>
